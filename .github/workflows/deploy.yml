name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy . --project-name sunilrathod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Ping Google
        run: curl -s "https://www.google.com/ping?sitemap=https://sunilrathod.pages.dev/sitemap.xml"

      - name: Ping Bing
        run: curl -s "https://www.bing.com/ping?sitemap=https://sunilrathod.pages.dev/sitemap.xml"

      - name: Ping IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "sunilrathod.pages.dev",
              "key": "${{ secrets.INDEXNOW_KEY }}",
              "urlList": ["https://sunilrathod.pages.dev/"]
            }'
